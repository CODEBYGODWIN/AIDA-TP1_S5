{% extends "base.html" %}
{% block title %}Importer un fichier{% endblock %}

{% block head %}
<style>
  .upload-card {
    background: #fff; border-radius: 10px; padding: 2.5rem;
    max-width: 500px; margin: 3rem auto;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
  }
  .upload-card h2 { margin-bottom: .5rem; font-size: 1.3rem; }
  .upload-card p { color: #666; font-size: .9rem; margin-bottom: 1.5rem; }
  .file-label {
    display: block; border: 2px dashed #c0c7d4; border-radius: 8px;
    padding: 1.5rem; text-align: center; cursor: pointer;
    color: #555; transition: border-color .2s;
  }
  .file-label:hover { border-color: #4a6fa5; color: #4a6fa5; }
  #file-name { margin-top: .6rem; font-size: .85rem; color: #4a6fa5; }
  input[type="file"] { display: none; }
  .btn {
    display: block; width: 100%; margin-top: 1.5rem;
    background: #1a1a2e; color: #fff; border: none;
    padding: .75rem; border-radius: 8px; font-size: 1rem;
    cursor: pointer; transition: background .2s;
  }
  .btn:hover { background: #2d2d5e; }
</style>
{% endblock %}

{% block content %}
<div class="upload-card">
  <h2>Importer un fichier CSV</h2>
  <p>Sélectionnez le fichier clients exporté depuis votre CRM.</p>
  <form action="/upload" method="post" enctype="multipart/form-data">
    <label class="file-label" for="fichier">
      Cliquez ou glissez un fichier .csv ici
      <div id="file-name">Aucun fichier sélectionné</div>
    </label>
    <input type="file" id="fichier" name="fichier" accept=".csv" required />
    <button type="submit" class="btn">Charger les données</button>
  </form>
</div>
<script>
  document.getElementById('fichier').addEventListener('change', function () {
    document.getElementById('file-name').textContent = this.files[0]?.name || 'Aucun fichier sélectionné';
  });
</script>
{% endblock %}
